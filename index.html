<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>My Scripts</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .info {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px auto;
      max-width: 600px;
      border-radius: 12px;
    }

    .buttons a {
      display: inline-block;
      margin: 5px 10px 0 0;
      color: #38bdf8;
      text-decoration: none;
    }

    .buttons a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<h1>📦 Мои скрипты</h1>

<div class="info">
  <h3>⚙️ Как установить</h3>
  <p>
    1. Установи Tampermonkey<br>
    2. Нажми "Установить"<br>
    3. Подтверди установку
  </p>
</div>

<div id="list">Загрузка...</div>

<script>
const USERNAME = "MrSnorch";
const REPO = "scripts";

function parseName(filename) {
  let name = filename.replace(".user.js", "");

  let match = name.match(/-(\d+(\.\d+)+)$/);
  let version = match ? match[1] : null;

  if (version) {
    name = name.replace("-" + version, "");
  }

  return { name, version };
}

// эвристика (не 100%)
function hasTampermonkeyHint() {
  return navigator.userAgent.includes("Tampermonkey");
}

async function loadScripts() {
  const container = document.getElementById("list");

  if (!container) {
    console.error("❌ #list не найден");
    return;
  }

  try {
    const res = await fetch(
      `https://api.github.com/repos/${USERNAME}/${REPO}/contents/files`
    );

    const files = await res.json();

    container.innerHTML = "";

    files.reverse().forEach(file => {
      if (file.type !== "file") return;

      const parsed = parseName(file.name);
      const hasTM = hasTampermonkeyHint();

      const el = document.createElement("div");
      el.className = "card";

      el.innerHTML = `
        <h2>${parsed.name}</h2>
        ${parsed.version ? `<p>Версия: ${parsed.version}</p>` : ""}

        <div class="buttons">
          ${
            hasTM
            ? `<a href="${file.download_url}" target="_blank">⚡ Установить</a>`
            : `
              <a href="https://www.tampermonkey.net/" target="_blank">🔧 Скачать Tampermonkey</a>
              <a href="${file.download_url}" download>⬇ Скачать скрипт</a>
            `
          }
        </div>
      `;

      container.appendChild(el);
    });

  } catch (e) {
    console.error(e);
    container.innerHTML = "❌ Ошибка загрузки";
  }
}

document.addEventListener("DOMContentLoaded", loadScripts);
</script>

</body>
</html>
