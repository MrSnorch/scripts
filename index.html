<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>My Scripts</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>📦 Мои скрипты</h1>
<div id="list">Загрузка...</div>

<script>
const USERNAME = "MrSnorch";
const REPO = "scripts-site";

async function loadScripts() {
  const res = await fetch(
    `https://api.github.com/repos/${USERNAME}/${REPO}/contents/files`
  );

  const files = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  files.forEach(file => {
    if (file.type !== "file") return;

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h2>${file.name}</h2>
      <a href="${file.download_url}" download>⬇ Скачать</a>
    `;

    container.appendChild(el);
  });
}

loadScripts();
</script>

</body>
</html>
