<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>My Scripts</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>📦 Мои скрипты</h1>
<div id="list">Загрузка...</div>

<script>
const USERNAME = "MrSnorch";
const REPO = "scripts";

function parseName(filename) {
  // убираем .user.js
  let name = filename.replace(".user.js", "");

  // достаём версию
  let versionMatch = name.match(/-(\d+(\.\d+)+)$/);

  let version = versionMatch ? versionMatch[1] : null;

  if (version) {
    name = name.replace("-" + version, "");
  }

  return { name, version };
}

async function loadScripts() {
  const res = await fetch(
    `https://api.github.com/repos/${USERNAME}/${REPO}/contents/files`
  );

  const files = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  files.reverse().forEach(file => {
    if (file.type !== "file") return;

    const parsed = parseName(file.name);

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h2>${parsed.name}</h2>
      ${parsed.version ? `<p>Версия: ${parsed.version}</p>` : ""}
      <a href="${file.download_url}" download>⬇ Скачать</a>
    `;

    container.appendChild(el);
  });
}

loadScripts();
</script>

</body>
</html>
