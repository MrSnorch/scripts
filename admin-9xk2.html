<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
</head>
<body>

<h1>🔒 Admin Panel</h1>

<input id="token" placeholder="GitHub Token"><br><br>
<input id="name" placeholder="Название"><br><br>
<input id="desc" placeholder="Описание"><br><br>
<input type="file" id="file"><br><br>

<button onclick="upload()">Загрузить</button>

<script>
const USERNAME = "ТВОЙ_НИК";
const REPO = "scripts-site";

// пароль (измени)
if (prompt("Пароль?") !== "1234") {
  document.body.innerHTML = "Доступ запрещен";
}

async function upload() {
  const token = document.getElementById('token').value;
  const name = document.getElementById('name').value;
  const desc = document.getElementById('desc').value;
  const file = document.getElementById('file').files[0];

  if (!token || !file || !name) {
    alert("Заполни всё");
    return;
  }

  try {
    // ===== 1. загрузка файла =====
    const content = await file.text();
    const base64 = btoa(unescape(encodeURIComponent(content)));
    const path = "files/" + file.name;

    await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${path}`, {
      method: "PUT",
      headers: {
        Authorization: "token " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "add script " + file.name,
        content: base64
      })
    });

    // ===== 2. получаем scripts.json =====
    const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/scripts.json`, {
      headers: {
        Authorization: "token " + token
      }
    });

    const data = await res.json();
    const json = JSON.parse(atob(data.content));

    // ===== 3. добавляем =====
    json.push({
      name: name,
      description: desc,
      file: path
    });

    const updated = btoa(unescape(encodeURIComponent(JSON.stringify(json, null, 2))));

    // ===== 4. обновляем =====
    await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/scripts.json`, {
      method: "PUT",
      headers: {
        Authorization: "token " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "update scripts list",
        content: updated,
        sha: data.sha
      })
    });

    alert("✅ Скрипт добавлен!");
  } catch (e) {
    console.error(e);
    alert("❌ Ошибка, смотри консоль");
  }
}
</script>

</body>
</html>
